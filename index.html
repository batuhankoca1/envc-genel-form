<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENVC Form</title>
<style>

body{
font-family: Arial;
background:#050712;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#070a17;
padding:30px;
border-radius:15px;
width:500px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:none;
}

button{
padding:12px;
background:#5b5cff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>ENVC Genel Başvuru</h2>

<form id="form">

<label>İsim Soyisim</label>
<input id="name">

<label>Okul</label>
<select id="school">
<option>Boğaziçi</option>
<option>Koç</option>
<option>İTÜ</option>
<option>Bilkent</option>
<option>Sabancı</option>
<option>Diğer</option>
</select>

<label>Bölüm & Sınıf</label>
<input id="department">

<label>Telefon</label>
<input id="phone">

<label>Email</label>
<input id="email">

<label>LinkedIn</label>
<input id="linkedin">

<label>Instagram</label>
<input id="instagram">

<button type="submit">Gönder</button>

</form>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbwJSmUtf6FJOwYurjdeDBAb22oNdNSg4iLvx8UN7x8zOwkVHxnKzI-CDHGQf7CfgwZ6/exec";

document.getElementById("form").addEventListener("submit", async function(e){

e.preventDefault();

const data={
name:document.getElementById("name").value,
school:document.getElementById("school").value,
department:document.getElementById("department").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
linkedin:document.getElementById("linkedin").value,
instagram:document.getElementById("instagram").value
};

await fetch(url,{
method:"POST",
body:JSON.stringify(data)
});

alert("Gönderildi");

});

</script>

</body>
</html>
